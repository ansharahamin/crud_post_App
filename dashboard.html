<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Post App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="container-fluid bodybg row">
    <nav class="navbar myNav mb-3">
      <div class="container-fluid">
        <img class="mb-4" src="./images/s-latter-logo_795228-18-removebg-preview.png" alt="" width="85" height="62">
        <a class="navbar-brand text-white fw-bold">Post App</a>
        <div class="d-flex ms-auto" role="search">
          <input id="searchValue" class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
          <button onclick="searchPosts()" class="btn btn-secondary">
            Search
          </button>
        </div>
        <button class="btn btn-danger ms-2" id="btn-logout" onclick="logout()">Logout</button>
      </div>
    </nav>

    <!-- postBox is hidden by default; app.js shows it after verifying session -->
    <div class="d-flex justify-content-around d-none flex-wrap" id="postBox">
      <!-- Hidden input to carry the logged-in user's name for post() function -->
      <input type="hidden" id="userName" value="">

      <div class="card postInput">
        <div class="m-2">
          <div class="mb-3">
            <label for="title" class="form-label fw-bold">Title</label>
            <input type="text" class="form-control boxShadow" id="title" aria-describedby="emailHelp">
          </div>
          <div class="mb-3">
            <label for="description" class="form-label fw-bold">Description</label>
            <textarea class="form-control boxShadow" id="description" rows="3"></textarea>
          </div>
          <div class="img d-flex justify-content-around gap-2">
            <img height="50" width="50" class="bgImg" onclick="clickAbleImg()"
              src="https://wallpapers.com/images/hd/explosion-glitter-background-flash-8qvrw7mcdhlbep78.jpg" alt=""
              srcset="">
            <img height="50" width="50" class="bgImg" onclick="clickAbleImg()"
              src="./images/artificial-intelligence-circuit-electric-line-600nw-2495924357.jpg" alt="" srcset="">
            <img height="50" width="50" class="bgImg" onclick="clickAbleImg()"
              src="./images/colorful-gradient-background-with-soft-blended-shadows-modern-design_901408-26104.jpg"
              alt="" srcset="">
            <img height="50" width="50" class="bgImg" onclick="clickAbleImg()"
              src="./images/gradient-background-blue-cyan-2-vector.jpg" alt="" srcset="">
            <img height="50" width="50" class="bgImg" onclick="clickAbleImg()"
              src="https://i.pinimg.com/736x/09/d5/fa/09d5fad0af9aa27e5da9883fbc1d4f4d.jpg" alt="" srcset="">
          </div>

          <button type="button" onclick="post()" class="btn MyBtn ms-auto ms-5 mt-3 postBtn">Post</button>
        </div>
      </div>
      <div class="" id="posts"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script type="module" src="js/app.js"></script>
</body>

</html>
